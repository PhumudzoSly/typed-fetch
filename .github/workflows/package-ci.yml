name: Package CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit && pnpm exec tsc -p tsconfig.esm.json --noEmit

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm exec biome check src test --diagnostic-level=error

      - name: Test
        run: pnpm test

      - name: Pack smoke test
        run: pnpm pack --pack-destination .

